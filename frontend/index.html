<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>molbot 聊天頁</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <h1>molbot</h1>
    <div id="modelInfo" class="model-info">模型：-</div>
    <div id="chatBox" class="chat-box"></div>

    <textarea id="messageInput" placeholder="輸入訊息，Enter 送出，Shift+Enter 換行"></textarea>

    <div class="controls">
      <button id="sendBtn">送出</button>
      <button id="continueBtn" disabled>續答</button>
      <button id="clearBtn">清空聊天</button>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
